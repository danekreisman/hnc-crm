<!DOCTYPE html>
<html>
<head>
  <title>Restore Automations - HNC CRM</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
    .result { margin-top: 20px; padding: 10px; border-radius: 4px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .loading { color: #666; }
  </style>
</head>
<body>
  <h1>🔄 Restore Automations</h1>
  <p>This will restore your old automations and seed the new lead automations.</p>
  <button onclick="restore()">Restore Now</button>
  <div id="result"></div>

  <script>
    async function restore() {
      const btn = document.querySelector('button');
      const resultEl = document.getElementById('result');
      
      btn.disabled = true;
      resultEl.innerHTML = '<div class="loading">Restoring automations...</div>';
      
      try {
        const response = await fetch('/api/seed-automations', { method: 'POST' });
        const data = await response.json();
        
        if (data.success) {
          resultEl.innerHTML = `
            <div class="result success">
              <strong>✅ Restoration Complete!</strong><br>
              • Created ${data.created_lead_automations} new lead automations<br>
              • Restored ${data.restored_old_automations} old automations<br>
              <br>
              <strong>Your old automations:</strong><br>
              • New Lead — Auto Quote<br>
              • Janitorial Lead — Walkthrough Request<br>
              <br>
              <strong>New lead automations:</strong><br>
              • Initial 3-day follow-up<br>
              • Nurture 30-day check-in<br>
              • Post-booking re-engagement<br>
              • Canceled customer win-back (disabled)<br>
            </div>
          `;
        } else {
          resultEl.innerHTML = `
            <div class="result error">
              <strong>❌ Restoration Failed</strong><br>
              ${data.error}
            </div>
          `;
        }
      } catch (error) {
        resultEl.innerHTML = `
          <div class="result error">
            <strong>❌ Error</strong><br>
            ${error.message}
          </div>
        `;
      }
      
      btn.disabled = false;
    }
  </script>
</body>
</html>
