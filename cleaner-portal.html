<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Cleaner Portal — Hawaii Natural Clean</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;color:#1e293b;}
  .card{background:#fff;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,0.08);padding:2.25rem 1.75rem;max-width:380px;width:100%;text-align:center;}
  h1{font-size:1.35rem;margin:0 0 .25rem;font-weight:650;letter-spacing:-.01em;}
  .sub{color:#64748b;margin:0 0 1.25rem;font-size:.92rem;line-height:1.45;}
  .signin{width:100%;padding:.75rem 1rem;background:#fff;color:#1e293b;border:1px solid #e2e8f0;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.625rem;font-family:inherit;}
  .signin:hover{border-color:#3BB8E3;color:#3BB8E3;}
  .signin[disabled]{opacity:.6;cursor:default;}
  .msg{margin-top:1rem;min-height:1.4rem;font-size:.88rem;color:#64748b;}
  .msg.error{color:#b91c1c;}
  .msg.success{color:#059669;}
  .signed-bar{display:flex;align-items:center;gap:.75rem;padding:.65rem .85rem;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:1.25rem;text-align:left;}
  .signed-bar .who{flex:1;min-width:0;}
  .signed-bar .label{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#64748b;font-weight:600;}
  .signed-bar .id{font-size:12px;font-weight:600;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  .signed-bar button{background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;color:#64748b;font-family:inherit;font-weight:600;}
  .signed-bar button:hover{border-color:#3BB8E3;color:#3BB8E3;}
  .placeholder{margin-top:1rem;padding:1rem;background:#f8fafc;border:1px dashed #cbd5e1;border-radius:10px;color:#475569;font-size:.88rem;line-height:1.5;}
</style>
</head>
<body>
<div class="card">
  <img src="/hnc-logo.png" alt="HNC" style="width:60px;margin-bottom:1rem;" onerror="this.style.display='none'">
  <h1>Cleaner Portal</h1>
  <p class="sub">Hawaii Natural Clean</p>
  <div id="content"></div>
  <div id="msg" class="msg"></div>
</div>
<script>
const SUPABASE_URL="https://hehfecnjmgsthxjxlvpz.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlaGZlY25qbWdzdGh4anhsdnB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDMwOTMsImV4cCI6MjA5MDgxOTA5M30.LRfDNzOjVQYUeldULv-8VFlZl6akxdHVfLBFCZDCa5o";
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const params=new URLSearchParams(location.search);
const inviteToken=params.get('invite');
const $msg=document.getElementById('msg');
const $content=document.getElementById('content');
function setMsg(t,k){$msg.textContent=t||'';$msg.className='msg'+(k?' '+k:'');}
const GOOGLE_SVG='<svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>';
function renderSignIn(prefix){
  $content.innerHTML=(prefix||'')+'<button class="signin" onclick="signInWithGoogle()">'+GOOGLE_SVG+'Sign in with Google</button>';
}
async function signInWithGoogle(){
  setMsg('Redirecting…');
  const redirectTo=location.origin+location.pathname+(inviteToken?'?invite='+encodeURIComponent(inviteToken):'');
  const {error}=await db.auth.signInWithOAuth({provider:'google',options:{redirectTo}});
  if(error)setMsg('Sign-in error: '+error.message,'error');
}
window.signInWithGoogle=signInWithGoogle;
async function signOutAndReload(){
  await db.auth.signOut();
  Object.keys(localStorage).filter(k=>k.startsWith('sb-')).forEach(k=>localStorage.removeItem(k));
  location.replace(location.pathname);
}
window.signOutAndReload=signOutAndReload;
async function init(){
  const {data:{session}}=await db.auth.getSession();
  if(location.hash.includes('access_token'))history.replaceState({},document.title,location.pathname+location.search);
  if(!session){
    if(inviteToken){
      renderSignIn('<p class="sub">You\'ve been invited. Sign in with Google to activate your account.</p>');
    } else {
      renderSignIn('<p class="sub">Sign in with Google to access your portal.</p>');
    }
    return;
  }
  const userEmail=session.user.email;
  if(inviteToken){
    setMsg('Activating your account…');
    try{
      const r=await fetch('/api/cleaner-portal/redeem-invite',{
        method:'POST',
        headers:{'Content-Type':'application/json',Authorization:'Bearer '+session.access_token},
        body:JSON.stringify({token:inviteToken})
      });
      const j=await r.json().catch(()=>({}));
      if(!r.ok||!j.success){
        setMsg('Activation failed: '+(j.error||('HTTP '+r.status)),'error');
        $content.innerHTML='<div class="signed-bar"><div class="who"><div class="label">Signed in as</div><div class="id">'+userEmail+'</div></div><button onclick="signOutAndReload()">Sign out</button></div><p class="sub">If your invite was already used or expired, ask your admin to send a new one.</p>';
        return;
      }
      history.replaceState({},document.title,location.pathname);
      location.reload();
      return;
    } catch(e){
      setMsg('Network error during activation: '+e.message,'error');
      return;
    }
  }
  const {data,error}=await db.from('cleaners').select('id,name,phone').eq('auth_email',userEmail).maybeSingle();
  if(error){setMsg('Lookup failed: '+error.message,'error');return;}
  if(!data){
    $content.innerHTML='<div class="signed-bar"><div class="who"><div class="label">Signed in as</div><div class="id">'+userEmail+'</div></div><button onclick="signOutAndReload()">Sign out</button></div><p class="sub">Your Google account isn\'t linked to a cleaner record yet. If you got an invite SMS, tap the link in that message. Otherwise, contact your admin.</p>';
    return;
  }
  $content.innerHTML='<div class="signed-bar"><div class="who"><div class="label">Cleaner</div><div class="id">'+data.name+'</div></div><button onclick="signOutAndReload()">Sign out</button></div><h2 style="margin:0 0 .5rem;font-size:1.05rem;color:#1e293b;">Welcome, '+data.name.split(' ')[0]+'!</h2><p class="sub">Your portal is being built. Soon you\'ll see your schedule, completed jobs, and pay history here.</p><div class="placeholder">Coming soon: upcoming jobs · job completion checklist · pay summary · time-off requests</div>';
}
init();
</script>
</body>
</html>
