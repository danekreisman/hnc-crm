<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Book Your Cleaning — Hawaii Natural Clean</title>
<link rel="icon" href="/hnc-logo.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#3BB8E3; --blue2:#59C7E2; --blue3:#79D3E1;
  --blue-light:#eaf7fb; --blue-border:#9adcf0;
  --blue-dark:#1F9EC6; --blue-deeper:#16758F;
  --gold:#F2E19B; --gold-dark:#7A5A00;
  --text:#0f1c24; --muted:#5b7683; --border:#e3eef2;
  --bg:#f7fbfc; --panel:#fff;
  --radius:14px;
  --shadow:0 4px 24px rgba(15,42,53,.08);
  --shadow-lg:0 8px 40px rgba(15,42,53,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text)}
body{background:linear-gradient(160deg,#eaf7fb 0%,#f7fbfc 40%,#eaf7fb 100%)}

.wrap{max-width:580px;margin:0 auto;padding:32px 16px 64px}

/* Logo */
.logo-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:36px}
.logo-row img{height:44px}
.logo-row .brand{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);line-height:1.2}
.logo-row .brand span{display:block;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:1px}

/* Steps */
.steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:32px}
.step{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.step-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);transition:all .3s;flex-shrink:0}
.step.active .step-dot{border-color:var(--blue);background:var(--blue);color:#fff}
.step.done .step-dot{border-color:var(--blue);background:var(--blue);color:#fff}
.step.active{color:var(--blue)}
.step-line{width:36px;height:2px;background:var(--border);margin:0 4px;transition:all .3s;flex-shrink:0}
.step-line.done{background:var(--blue)}

/* Card */
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card-head{padding:22px 24px 18px;border-bottom:1px solid var(--border)}
.card-head h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:5px}
.card-head p{font-size:13px;color:var(--muted);line-height:1.55}
.card-body{padding:24px}

/* Quote summary */
.quote-block{background:var(--blue-light);border:1px solid var(--blue-border);border-radius:10px;padding:16px 18px;margin-bottom:20px}
.quote-meta{display:flex;gap:24px;margin-bottom:12px}
.quote-meta-item .label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.quote-meta-item .val{font-size:14px;font-weight:600;color:var(--text);margin-top:2px}
.price-table{background:#fff;border:1px solid var(--blue-border);border-radius:8px;padding:12px 14px}
.price-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--muted)}
.price-row .amount{font-weight:500;color:var(--text)}
.price-row.discount .amount{color:var(--blue-dark)}
.price-divider{border:none;border-top:1px solid var(--blue-border);margin:8px 0}
.price-total{display:flex;justify-content:space-between;font-size:16px;font-weight:700;color:var(--blue-dark)}

/* Rush fee */
.rush-notice{border-radius:10px;padding:12px 14px;margin-top:14px;font-size:13px;line-height:1.5}
.rush-notice.same-day{background:#fef2f2;border:1px solid #fca5a5;color:#b91c1c}
.rush-notice.next-day{background:#fff7ed;border:1px solid #fdba74;color:#9a3412}
.rush-notice.two-day{background:#fefce8;border:1px solid #fde68a;color:#78350f}
.rush-fee-label{font-size:15px;font-weight:700;margin-bottom:3px}

/* Policy items */
.policy-item{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;background:#fff;transition:border-color .2s,background .2s}
.policy-item:hover{border-color:var(--blue-border);background:var(--blue-light)}
.policy-item.checked{border-color:var(--blue);background:var(--blue-light)}
.policy-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--blue);flex-shrink:0;margin-top:2px;cursor:pointer}
.pi-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.pi-detail{font-size:12px;color:var(--muted);line-height:1.5}

/* Calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav-btn{background:#fff;border:1px solid var(--border);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:18px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.cal-nav-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue)}
.cal-nav-btn:disabled{opacity:.3;cursor:not-allowed}
.cal-month{font-weight:700;font-size:15px;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-hdr{text-align:center;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;padding:5px 0}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .15s;position:relative}
.cal-day:hover:not(.blocked):not(.past):not(.empty):not(.sunday){background:var(--blue-light);border-color:var(--blue-border);color:var(--blue)}
.cal-day.today{border-color:var(--blue-border);font-weight:700}
.cal-day.selected{background:var(--blue) !important;color:#fff !important;border-color:var(--blue) !important;font-weight:700}
.cal-day.blocked{background:#fef2f2;color:#fca5a5;cursor:not-allowed;text-decoration:line-through;font-size:12px}
.cal-day.past{color:#d1d5db;cursor:not-allowed}
.cal-day.empty{cursor:default}
.cal-day.sunday{color:#fca5a5;cursor:not-allowed}
.cal-legend{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.cal-legend-swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* Time slots */
.slots-section{margin-top:16px}
.slots-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px}
.slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.slot-btn{padding:10px 6px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s;text-align:center;color:var(--text);font-weight:500}
.slot-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.slot-btn.selected{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:700}
.slot-btn:disabled{opacity:.3;cursor:not-allowed;text-decoration:line-through}

/* Buttons */
.btn-primary{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--blue);color:#fff;box-shadow:0 4px 16px rgba(59,184,227,.3);transition:all .2s;text-align:center;margin-top:16px}
.btn-primary:hover:not(:disabled){filter:brightness(1.07);box-shadow:0 6px 20px rgba(59,184,227,.4)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.btn-ghost{display:block;width:100%;padding:10px;background:none;border:none;color:var(--muted);font-size:13px;font-family:inherit;cursor:pointer;margin-top:8px;font-weight:500}
.btn-ghost:hover{color:var(--text)}

/* Form */
.field{margin-top:16px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.field label span{font-weight:400;text-transform:none;letter-spacing:0}
.field textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;color:var(--text);resize:vertical;min-height:80px;transition:border-color .2s}
.field textarea:focus{outline:none;border-color:var(--blue)}

/* Alerts */
.error-banner{background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;padding:14px;font-size:13px;color:#b91c1c;margin-top:12px;text-align:center}
.loading-msg{text-align:center;padding:20px;color:var(--muted);font-size:13px}

/* Success */
.success-screen{text-align:center;padding:40px 24px}
.success-icon{font-size:52px;margin-bottom:16px}
.success-screen h2{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:10px}
.success-screen p{color:var(--muted);font-size:14px;line-height:1.65;max-width:360px;margin:0 auto}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-row">
    <img src="/hnc-logo.png" alt="HNC" onerror="this.style.display='none'">
    <div class="brand">Hawaii Natural Clean<span>Booking Portal</span></div>
  </div>

  <div class="steps" id="steps-bar">
    <div class="step active" id="step1"><div class="step-dot">1</div>Your quote</div>
    <div class="step-line" id="line1"></div>
    <div class="step" id="step2"><div class="step-dot">2</div>Policies</div>
    <div class="step-line" id="line2"></div>
    <div class="step" id="step3"><div class="step-dot">3</div>Book</div>
  </div>

  <div id="app"><div class="card"><div class="card-body loading-msg">Loading your quote&hellip;</div></div></div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────
var TOKEN    = new URLSearchParams(location.search).get('bt');
var LEAD     = null;
var AVAIL    = null;   // { blocked_dates:[], busy_times:{} }
var CAL_YEAR = 0;
var CAL_MON  = 0;     // 0-indexed
var SEL_DATE = null;
var SEL_TIME = null;
var RUSH_FEE = 0;

var ALL_SLOTS = ['8:00 AM','9:00 AM','10:00 AM','11:00 AM','12:00 PM','1:00 PM','2:00 PM','3:00 PM','4:00 PM'];
var TAX_RATE  = 0.04712;

// ─── Helpers ──────────────────────────────────────────────────────────────
function $(id){ return document.getElementById(id); }
function fmt(n){ return '$' + Number(n).toFixed(2); }
function setStep(n){
  [1,2,3].forEach(function(i){
    $('step'+i).className = 'step'+(i<n?' done':i===n?' active':'');
    if($('line'+i)) $('line'+i).className = 'step-line'+(i<n?' done':'');
  });
}
function today(){ var d=new Date();d.setHours(0,0,0,0);return d; }
function toISO(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

// ─── Boot ─────────────────────────────────────────────────────────────────
if(!TOKEN){
  $('app').innerHTML='<div class="card"><div class="card-body"><div class="error-banner">No booking link detected. Please use the link from your quote email.</div><p style="text-align:center;color:var(--muted);font-size:13px;margin-top:14px">Questions? Call or text <strong>(808) 468-5356</strong></p></div></div>';
} else {
  loadLead();
}

async function loadLead(){
  try {
    var r = await fetch('/api/lead-book?token='+encodeURIComponent(TOKEN));
    var j = await r.json();
    if(!r.ok) throw new Error(j.error || 'Invalid link');
    LEAD = j;
    renderStep1();
  } catch(e){
    $('app').innerHTML='<div class="card"><div class="card-body"><div class="error-banner">'+e.message+'</div><p style="text-align:center;color:var(--muted);font-size:13px;margin-top:14px">Questions? Call or text <strong>(808) 468-5356</strong></p></div></div>';
  }
}

// ─────────────────────────────────────────────────────────────────────────
// STEP 1 — Quote summary
// ─────────────────────────────────────────────────────────────────────────
function renderStep1(){
  setStep(1);
  var q         = LEAD.quoteData || {};
  var subtotal  = q.subtotal != null ? Number(q.subtotal) : (LEAD.quoteTotal ? Number(LEAD.quoteTotal) : null);
  var discount  = Number(q.discount || 0);
  var discPct   = Number(q.discount_pct || 0);
  var preTotal  = q.total != null ? Number(q.total) : (subtotal != null ? subtotal - discount : null);
  var tax       = preTotal != null ? +(preTotal * TAX_RATE).toFixed(2) : null;
  var grandTotal= preTotal != null && tax != null ? +(preTotal + tax).toFixed(2) : null;

  var metaHtml = '';
  if(LEAD.service)   metaHtml += '<div class="quote-meta-item"><div class="label">Service</div><div class="val">'+esc(LEAD.service)+'</div></div>';
  if(LEAD.frequency) metaHtml += '<div class="quote-meta-item"><div class="label">Frequency</div><div class="val">'+esc(LEAD.frequency)+'</div></div>';
  if(LEAD.beds||LEAD.baths) metaHtml += '<div class="quote-meta-item"><div class="label">Property</div><div class="val">'+(LEAD.beds||'?')+' bed / '+(LEAD.baths||'?')+' bath</div></div>';

  var priceHtml = '';
  if(grandTotal != null){
    priceHtml = '<div class="price-table">'
      +(subtotal!=null?'<div class="price-row"><span>Subtotal</span><span class="amount">'+fmt(subtotal)+'</span></div>':'')
      +(discPct>0?'<div class="price-row discount"><span>'+discPct+'% frequency discount</span><span class="amount">&minus;'+fmt(discount)+'</span></div>':'')
      +'<div class="price-row"><span>Hawaii GET (4.712%)</span><span class="amount">'+fmt(tax)+'</span></div>'
      +'<hr class="price-divider">'
      +'<div class="price-total"><span>Total</span><span>'+fmt(grandTotal)+'</span></div>'
      +'</div>';
  } else {
    priceHtml = '<div class="price-table" style="color:var(--muted);font-size:13px;">Custom quote &mdash; we will confirm pricing after a walkthrough.</div>';
  }

  $('app').innerHTML = '<div class="card">'
    +'<div class="card-head"><h2>Aloha, '+esc(LEAD.firstName)+'! &#127946;</h2>'
    +'<p>Here is your personalized quote from Hawaii Natural Clean. Review the details below, then click Continue to review our policies and book your cleaning.</p></div>'
    +'<div class="card-body">'
    +'<div class="quote-block">'
    +(metaHtml?'<div class="quote-meta">'+metaHtml+'</div>':'')
    +priceHtml
    +'</div>'
    +'<button class="btn-primary" onclick="renderStep2()">Continue &rarr;</button>'
    +'</div></div>';
}

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];}); }

// ─────────────────────────────────────────────────────────────────────────
// STEP 2 — Policies
// ─────────────────────────────────────────────────────────────────────────
var POLICIES = [
  { id:'p1', title:'Cancellation policy',
    detail:'Please provide at least 24 hours notice to cancel or reschedule. Late cancellations may incur a fee.' },
  { id:'p2', title:'Home preparation',
    detail:'Please tidy clutter from surfaces, do dishes or put them away, and secure any pets before our team arrives. This helps us focus on deep cleaning.' },
  { id:'p3', title:'Property access',
    detail:'Please ensure we have access to your property at the scheduled time. You will be asked to provide entry instructions when booking.' },
  { id:'p4', title:'Payment terms',
    detail:'Payment is due on the day of service. We accept ACH bank transfer (free) and credit/debit card (3% processing fee).' },
  { id:'p5', title:'I agree to the terms of service',
    detail:'By proceeding I authorise Hawaii Natural Clean to perform cleaning services as described and agree to the policies above.' }
];

function renderStep2(){
  setStep(2);
  var items = POLICIES.map(function(p){
    return '<div class="policy-item" id="pi-'+p.id+'" onclick="togglePolicy(\''+p.id+'\')">'
      +'<input type="checkbox" id="cb-'+p.id+'" onclick="event.stopPropagation();togglePolicy(\''+p.id+'\')">'
      +'<div><div class="pi-title">'+esc(p.title)+'</div><div class="pi-detail">'+esc(p.detail)+'</div></div>'
      +'</div>';
  }).join('');

  $('app').innerHTML = '<div class="card">'
    +'<div class="card-head"><h2>Policies &amp; checklist</h2>'
    +'<p>Please read and agree to all items below to continue with your booking.</p></div>'
    +'<div class="card-body">'
    +items
    +'<button class="btn-primary" id="policy-btn" onclick="confirmPolicies()" disabled>Agree &amp; Continue &rarr;</button>'
    +'<button class="btn-ghost" onclick="renderStep1()">&larr; Back</button>'
    +'</div></div>';
}

function togglePolicy(id){
  var cb   = $('cb-'+id);
  var item = $('pi-'+id);
  if(!cb) return;
  cb.checked = !cb.checked;
  item.className = 'policy-item'+(cb.checked?' checked':'');
  var allOk = POLICIES.every(function(p){ var c=$('cb-'+p.id); return c&&c.checked; });
  var btn = $('policy-btn');
  if(btn){ btn.disabled=!allOk; }
}

function confirmPolicies(){
  var allOk = POLICIES.every(function(p){ var c=$('cb-'+p.id); return c&&c.checked; });
  if(!allOk){ alert('Please agree to all items to continue.'); return; }
  renderStep3();
}

// ─────────────────────────────────────────────────────────────────────────
// STEP 3 — Calendar + time slots
// ─────────────────────────────────────────────────────────────────────────
async function renderStep3(){
  setStep(3);
  SEL_DATE = null;
  SEL_TIME = null;
  RUSH_FEE = 0;

  var t = today();
  CAL_YEAR = t.getFullYear();
  CAL_MON  = t.getMonth();

  $('app').innerHTML = '<div class="card">'
    +'<div class="card-head"><h2>Pick your date</h2>'
    +'<p>Select an available date and time. Blocked dates are fully booked based on your team\'s live schedule.</p></div>'
    +'<div class="card-body">'
    +'<div id="cal-area"><div class="loading-msg">Loading availability&hellip;</div></div>'
    +'<div id="slots-area"></div>'
    +'<div id="rush-area"></div>'
    +'<div class="field"><label>Entry instructions &amp; notes <span>(optional)</span></label>'
    +'<textarea id="bk-notes" placeholder="Gate code, pets, parking, any special requests..."></textarea></div>'
    +'<div id="bk-error"></div>'
    +'<button class="btn-primary" id="bk-btn" onclick="submitBooking()" disabled>Select a date and time to continue</button>'
    +'<button class="btn-ghost" onclick="renderStep2()">&larr; Back</button>'
    +'</div></div>';

  // Load availability
  try {
    var island = (LEAD && LEAD.island) || 'Oahu';
    var r = await fetch('/api/availability?island='+encodeURIComponent(island)+'&days=60');
    AVAIL = await r.json();
  } catch(e){
    AVAIL = { blocked_dates:[], busy_times:{} };
  }
  drawCalendar();
}

function drawCalendar(){
  var calEl = $('cal-area');
  if(!calEl) return;

  var tod     = today();
  var todStr  = toISO(tod);
  var blocked = (AVAIL && AVAIL.blocked_dates) || [];
  var busy    = (AVAIL && AVAIL.busy_times)    || {};

  var firstOfMonth = new Date(CAL_YEAR, CAL_MON, 1);
  var startDay     = firstOfMonth.getDay();        // 0=Sun
  var daysInMonth  = new Date(CAL_YEAR, CAL_MON+1, 0).getDate();
  var monthName    = firstOfMonth.toLocaleDateString('en-US',{month:'long',year:'numeric'});

  // Prev button disabled if showing current month
  var isCurrentMonth = (CAL_YEAR===tod.getFullYear() && CAL_MON===tod.getMonth());

  var gridHtml = '';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(function(d){ gridHtml+='<div class="cal-hdr">'+d+'</div>'; });
  for(var i=0;i<startDay;i++) gridHtml+='<div class="cal-day empty"></div>';

  for(var d=1;d<=daysInMonth;d++){
    var ds  = CAL_YEAR+'-'+String(CAL_MON+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var dt  = new Date(ds+'T00:00:00');
    var sun = dt.getDay()===0;
    var past= ds<todStr;
    var blk = blocked.indexOf(ds)>=0;
    var sel = ds===SEL_DATE;
    var cls = 'cal-day';
    if(sel)  cls+=' selected';
    else if(past) cls+=' past';
    else if(sun)  cls+=' sunday';
    else if(blk)  cls+=' blocked';
    else if(ds===todStr) cls+=' today';

    var clickable = !past && !sun && !blk;
    var onclick   = clickable ? ' onclick="pickDate(\''+ds+'\')"' : '';
    var title     = sun?'Closed Sundays':blk?'Fully booked':past?'Past date':'';
    var titleAttr = title ? ' title="'+title+'"' : '';
    gridHtml += '<div class="'+cls+'"'+onclick+titleAttr+'>'+d+'</div>';
  }

  calEl.innerHTML = '<div class="cal-nav">'
    +'<button class="cal-nav-btn" onclick="calMove(-1)"'+(isCurrentMonth?' disabled':'')+'>&#8249;</button>'
    +'<span class="cal-month">'+monthName+'</span>'
    +'<button class="cal-nav-btn" onclick="calMove(1)">&#8250;</button>'
    +'</div>'
    +'<div class="cal-grid">'+gridHtml+'</div>'
    +'<div class="cal-legend">'
    +'<div class="cal-legend-item"><div class="cal-legend-swatch" style="background:var(--blue)"></div>Selected</div>'
    +'<div class="cal-legend-item"><div class="cal-legend-swatch" style="background:#fef2f2;border:1px solid #fca5a5"></div>Fully booked</div>'
    +'<div class="cal-legend-item"><div class="cal-legend-swatch" style="background:#e5e7eb"></div>Unavailable</div>'
    +'</div>';
}

function calMove(dir){
  CAL_MON += dir;
  if(CAL_MON>11){ CAL_MON=0; CAL_YEAR++; }
  if(CAL_MON<0){ CAL_MON=11; CAL_YEAR--; }
  drawCalendar();
}

function pickDate(ds){
  SEL_DATE = ds;
  SEL_TIME = null;
  RUSH_FEE = 0;
  drawCalendar();
  drawSlots(ds);
  drawRushFee(ds);
  updateSubmitBtn();
}

function drawSlots(ds){
  var slotsEl = $('slots-area');
  if(!slotsEl) return;
  var busy = (AVAIL && AVAIL.busy_times && AVAIL.busy_times[ds]) || [];
  var dt   = new Date(ds+'T00:00:00');
  var pretty = dt.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  var btns = ALL_SLOTS.map(function(s){
    var isBusy = busy.indexOf(s)>=0;
    var sel    = s===SEL_TIME;
    return '<button class="slot-btn'+(sel?' selected':'')+'"'
      +(isBusy?' disabled title="Fully booked"':' onclick="pickSlot(\''+s+'\')"')
      +'>'+s+'</button>';
  }).join('');

  slotsEl.innerHTML = '<div class="slots-section">'
    +'<div class="slots-label">Available times &mdash; '+pretty+'</div>'
    +'<div class="slot-grid">'+btns+'</div>'
    +'</div>';
}

function pickSlot(s){
  SEL_TIME = s;
  drawSlots(SEL_DATE);
  updateSubmitBtn();
}

function getRushInfo(ds){
  var t    = today();
  var pick = new Date(ds+'T00:00:00');
  var days = Math.round((pick-t)/(864e5));
  if(days===0) return { fee:200, label:'Same-day', cls:'same-day' };
  if(days===1) return { fee:100, label:'Next-day',  cls:'next-day'  };
  if(days===2) return { fee:50,  label:'2-day',     cls:'two-day'   };
  return { fee:0, label:null, cls:null };
}

function drawRushFee(ds){
  var rushEl = $('rush-area');
  if(!rushEl) return;
  var r = getRushInfo(ds);
  RUSH_FEE = r.fee;
  if(!r.fee){ rushEl.innerHTML=''; return; }

  var q         = LEAD.quoteData || {};
  var preTotal  = q.total!=null ? Number(q.total) : (LEAD.quoteTotal ? Number(LEAD.quoteTotal) : null);
  var tax       = preTotal!=null ? +(preTotal*TAX_RATE).toFixed(2) : null;
  var newTotal  = preTotal!=null && tax!=null ? fmt(preTotal+tax+r.fee) : null;

  rushEl.innerHTML = '<div class="rush-notice '+r.cls+'">'
    +'<div class="rush-fee-label">+'+fmt(r.fee)+' '+r.label+' booking fee</div>'
    +(newTotal?'<div>'+r.label+' requests require extra scheduling coordination. New total with tax: <strong>'+newTotal+'</strong></div>'
    :'<div>'+r.label+' requests require extra scheduling coordination.</div>')
    +'</div>';
}

function updateSubmitBtn(){
  var btn = $('bk-btn');
  if(!btn) return;
  if(SEL_DATE && SEL_TIME){
    btn.disabled = false;
    btn.textContent = 'Confirm booking request \u2192';
  } else {
    btn.disabled = true;
    btn.textContent = 'Select a date and time to continue';
  }
}

// ─────────────────────────────────────────────────────────────────────────
// SUBMIT
// ─────────────────────────────────────────────────────────────────────────
async function submitBooking(){
  if(!SEL_DATE||!SEL_TIME){ return; }
  var btn   = $('bk-btn');
  var errEl = $('bk-error');
  var notes = $('bk-notes') ? $('bk-notes').value : '';
  btn.disabled=true; btn.textContent='Sending\u2026';

  try {
    var r = await fetch('/api/lead-book',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ token:TOKEN, date:SEL_DATE, time:SEL_TIME, notes:notes, service:LEAD.service, rushFee:RUSH_FEE, policiesAgreed: true })
    });
    var j = await r.json();
    if(!r.ok) throw new Error(j.error||'Something went wrong');
    renderSuccess(j);
  } catch(e){
    btn.disabled=false; btn.textContent='Confirm booking request \u2192';
    if(errEl) errEl.innerHTML='<div class="error-banner">'+esc(e.message)+'</div>';
  }
}

// ─────────────────────────────────────────────────────────────────────────
// SUCCESS
// ─────────────────────────────────────────────────────────────────────────
function renderSuccess(result){
  $('steps-bar').style.display='none';
  var rush = RUSH_FEE > 0 ? getRushInfo(SEL_DATE) : null;
  $('app').innerHTML = '<div class="card"><div class="success-screen">'
    +'<div class="success-icon">&#127946;</div>'
    +'<h2>You\'re booked!</h2>'
    +'<p>Your cleaning is confirmed for <strong>'+esc(result.date || SEL_DATE)+'</strong> at <strong>'+esc(result.time || SEL_TIME)+'</strong>.'
    +(rush ? ' A '+rush.label.toLowerCase()+' fee of '+fmt(rush.fee)+' applies.' : '')
    +'<br><br>A confirmation has been sent to your email. Our team will be in touch with your cleaner assignment shortly. Questions? Call or text <strong>(808) 468-5356</strong>. We look forward to seeing you! &#127946;</p>'
    +'</div></div>';
}
</script>
</body>
</html>
