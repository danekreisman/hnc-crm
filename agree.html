<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Service Agreement — Hawaii Natural Clean</title>
<link rel="icon" href="/hnc-logo.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--blue:#3BB8E3;--blue-light:#eaf7fb;--blue-border:#9adcf0;--blue-dark:#1F9EC6;--text:#0f1c24;--muted:#5b7683;--border:#e3eef2;--panel:#fff;--radius:14px;--shadow:0 4px 24px rgba(15,42,53,.08)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text)}
body{background:linear-gradient(160deg,#eaf7fb 0%,#f7fbfc 40%,#eaf7fb 100%)}
.wrap{max-width:580px;margin:0 auto;padding:32px 16px 64px}
.logo-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:24px}
.logo-row img{height:44px}
.brand{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);line-height:1.2}
.brand span{display:block;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:18px}
.card-head{padding:22px 24px 18px;border-bottom:1px solid var(--border)}
.card-head h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:5px}
.card-head p{font-size:13px;color:var(--muted);line-height:1.55}
.card-body{padding:20px 24px 24px}

/* Hero */
.hero{padding:26px 24px;text-align:center}
.hero h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:8px}
.hero p{color:var(--muted);font-size:14px;line-height:1.6;max-width:420px;margin:0 auto}

/* Service accordion */
.service-row{border:1.5px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;background:#fff;transition:border-color .2s}
.service-row.open{border-color:var(--blue-border)}
.service-toggle{width:100%;background:none;border:none;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;font-family:inherit;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;text-align:left;transition:background .2s}
.service-toggle:hover{background:var(--blue-light)}
.service-row.open .service-toggle{background:var(--blue-light);border-bottom:1px solid var(--border)}
.svc-label{display:flex;align-items:center;gap:10px}
.svc-emoji{font-size:18px}
.caret{color:var(--blue);font-size:13px;transition:transform .25s ease;display:inline-block}
.service-row.open .caret{transform:rotate(180deg)}
.service-detail{display:none;padding:16px 18px 18px}
.service-row.open .service-detail{display:block}
.service-intro{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:14px;padding-bottom:12px;border-bottom:1px dashed var(--border)}
.section-heading{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--blue-dark);margin:14px 0 6px}
.section-heading:first-of-type{margin-top:0}
.checklist-items{list-style:none;padding:0}
.checklist-items li{padding:5px 0 5px 24px;position:relative;font-size:13px;color:var(--text);line-height:1.55}
.checklist-items li::before{content:'';position:absolute;left:6px;top:10px;width:6px;height:10px;border:solid var(--blue);border-width:0 2px 2px 0;transform:rotate(45deg)}
.service-footnote{margin-top:14px;padding:10px 12px;background:#fff8e6;border:1px solid #f4d35e;border-radius:8px;font-size:12px;color:#7a5c00;line-height:1.5}

/* Before we arrive */
.prep-list{list-style:none;padding:0}
.prep-list li{padding:7px 0 7px 26px;position:relative;font-size:13.5px;color:var(--text);line-height:1.55}
.prep-list li::before{content:'';position:absolute;left:0;top:9px;width:14px;height:14px;border:1.5px solid var(--blue);border-radius:3px}

/* Policies */
.policy-item{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;background:#fff;transition:border-color .2s,background .2s}
.policy-item:hover{border-color:var(--blue-border);background:var(--blue-light)}
.policy-item.checked{border-color:var(--blue);background:var(--blue-light)}
.policy-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--blue);flex-shrink:0;margin-top:2px;cursor:pointer}
.pi-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.pi-detail{font-size:12px;color:var(--muted);line-height:1.5}

/* Buttons / states */
.btn-primary{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--blue);color:#fff;box-shadow:0 4px 16px rgba(59,184,227,.3);transition:all .2s;margin-top:18px}
.btn-primary:hover:not(:disabled){background:var(--blue-dark)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.error-banner{background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;padding:14px;font-size:13px;color:#b91c1c;margin-top:12px;text-align:center}
.success-screen{text-align:center;padding:40px 24px}
.success-icon{font-size:52px;margin-bottom:16px}
.success-screen h2{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:10px}
.success-screen p{color:var(--muted);font-size:14px;line-height:1.65;max-width:360px;margin:0 auto}
.loading-state{padding:40px;text-align:center;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-row">
    <img src="/hnc-logo.png" alt="HNC" onerror="this.style.display='none'">
    <div class="brand">Hawaii Natural Clean<span>Service Agreement</span></div>
  </div>
  <div id="app"><div class="card"><div class="loading-state">Loading&hellip;</div></div></div>
</div>
<script>
var CLIENT_ID = new URLSearchParams(location.search).get('c');
var POLICIES = [];
var CHECKLISTS = null;
var SERVICE_EMOJI = { regular:'\uD83E\uDDFA', deep:'\uD83E\uDDFC', moveout:'\uD83D\uDCE6', airbnb:'\uD83C\uDFDD\uFE0F' };

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];}); }

if(!CLIENT_ID){
  $('app').innerHTML='<div class="card"><div class="card-body"><div class="error-banner">Invalid link. Please use the link sent to you by Hawaii Natural Clean.</div></div></div>';
} else {
  Promise.all([
    fetch('/api/get-policies').then(function(r){return r.json();}),
    fetch('/api/get-checklists').then(function(r){return r.json();})
  ]).then(function(results){
    POLICIES = (results[0] && results[0].policies) || [];
    CHECKLISTS = results[1] || {};
    renderAll();
  }).catch(function(){
    $('app').innerHTML='<div class="card"><div class="card-body"><div class="error-banner">Unable to load. Please try again or contact us at (808) 468-5356.</div></div></div>';
  });
}

function renderAll(){
  var html = '';

  html += '<div class="card"><div class="hero">'
    + '<h1>Aloha! \uD83C\uDF3A</h1>'
    + '<p>Before we get started, please take a moment to review what\'s included in your service and agree to our policies. Takes about 2 minutes.</p>'
    + '</div></div>';

  if (CHECKLISTS && CHECKLISTS.services && CHECKLISTS.services.length) {
    html += '<div class="card">'
      + '<div class="card-head"><h2>What\'s included \u2728</h2><p>Tap any service to see its full checklist.</p></div>'
      + '<div class="card-body">'
      + CHECKLISTS.services.map(renderService).join('')
      + '</div></div>';
  }

  if (CHECKLISTS && CHECKLISTS.beforeArrival && CHECKLISTS.beforeArrival.length) {
    html += '<div class="card">'
      + '<div class="card-head"><h2>Before we arrive \uD83C\uDFDD\uFE0F</h2><p>A few quick things that help us do our best work for you.</p></div>'
      + '<div class="card-body"><ul class="prep-list">'
      + CHECKLISTS.beforeArrival.map(function(item){return '<li>'+esc(item)+'</li>';}).join('')
      + '</ul></div></div>';
  }

  html += '<div class="card">'
    + '<div class="card-head"><h2>Our service policies \uD83C\uDF3A</h2><p>Please review and check each policy below to continue.</p></div>'
    + '<div class="card-body">'
    + POLICIES.map(function(p){
        return '<div class="policy-item" id="pi-'+p.id+'" onclick="togglePolicy(\''+p.id+'\')">'
          +'<input type="checkbox" id="cb-'+p.id+'" onclick="event.stopPropagation();togglePolicy(\''+p.id+'\')">'
          +'<div><div class="pi-title">'+esc(p.title)+'</div><div class="pi-detail">'+esc(p.detail)+'</div></div>'
          +'</div>';
      }).join('')
    + '<button class="btn-primary" id="agree-btn" onclick="submitAgreement()" disabled>I agree &amp; confirm</button>'
    + '<div id="err"></div>'
    + '</div></div>';

  $('app').innerHTML = html;
}

function renderService(svc){
  var emoji = SERVICE_EMOJI[svc.id] || '\u2728';
  var inner = '';
  if (svc.intro) inner += '<div class="service-intro">'+esc(svc.intro)+'</div>';
  inner += (svc.sections || []).map(function(sec){
    return '<div class="section-heading">'+esc(sec.heading)+'</div>'
      + '<ul class="checklist-items">'
      + (sec.items || []).map(function(it){return '<li>'+esc(it)+'</li>';}).join('')
      + '</ul>';
  }).join('');
  if (svc.footnote) inner += '<div class="service-footnote">'+esc(svc.footnote)+'</div>';

  return '<div class="service-row" id="svc-row-'+svc.id+'">'
    + '<button class="service-toggle" onclick="toggleService(\''+svc.id+'\')">'
      + '<span class="svc-label"><span class="svc-emoji">'+emoji+'</span><span>'+esc(svc.label)+'</span></span>'
      + '<span class="caret">&#x25BE;</span>'
    + '</button>'
    + '<div class="service-detail">'+inner+'</div>'
    + '</div>';
}

function toggleService(id){
  var row = $('svc-row-'+id);
  if (!row) return;
  row.classList.toggle('open');
}

function togglePolicy(id){
  var cb = $('cb-'+id);
  var item = $('pi-'+id);
  if(!cb) return;
  cb.checked = !cb.checked;
  item.className = 'policy-item'+(cb.checked?' checked':'');
  var allOk = POLICIES.every(function(p){ var c=$('cb-'+p.id); return c&&c.checked; });
  var btn = $('agree-btn');
  if(btn) btn.disabled = !allOk;
}

async function submitAgreement(){
  var allOk = POLICIES.every(function(p){ var c=$('cb-'+p.id); return c&&c.checked; });
  if(!allOk){ alert('Please agree to all policies to continue.'); return; }
  var btn = $('agree-btn');
  btn.disabled = true; btn.textContent = 'Saving\u2026';

  try {
    var r = await fetch('/api/policy-agree', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ clientId: CLIENT_ID })
    });
    var j = await r.json();
    if(!r.ok) throw new Error(j.error||'Something went wrong');
    $('app').innerHTML = '<div class="card"><div class="success-screen">'
      +'<div class="success-icon">&#10003;</div>'
      +'<h2>All set!</h2>'
      +'<p>Thank you for reviewing the details and agreeing to our policies. We\'ve recorded your agreement and look forward to serving you. If you have any questions, call or text us at <strong>(808) 468-5356</strong>. \uD83C\uDFC4</p>'
      +'</div></div>';
  } catch(e){
    btn.disabled = false; btn.textContent = 'I agree & confirm';
    $('err').innerHTML = '<div class="error-banner">'+esc(e.message)+'</div>';
  }
}
</script>
</body>
</html>
